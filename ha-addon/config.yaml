name: "Knowledge Curator"
description: "KI-kuratierter Wissens-Digest - automatisch aus YouTube, Podcasts, Papers, Blogs"
version: "1.0.0"
slug: "knowledge_curator"
url: "https://github.com/bene/knowledge-curator"
