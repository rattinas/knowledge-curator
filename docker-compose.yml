version: '3.8'

services:
  knowledge-curator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-curator
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - curator-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  curator-data:
    driver: local
